name: bot-hosting 自动续期

on:
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 = UTC+8 08:00
  workflow_dispatch:

jobs:
  renew:
    name: 续期任务
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SING_BOX_VERSION: '1.10.7'
      LOCAL_PROXY: 'http://127.0.0.1:8080'

    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4

      - name: 2. 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. 安装系统依赖（xvfb + Chrome 运行库）
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb curl \
            libnss3 libxss1 libasound2t64 libatk1.0-0 libatk-bridge2.0-0 \
            libgtk-3-0 libgbm1 libxdamage1 libxcomposite1 libxrandr2 \
            fonts-liberation

      - name: 4. 安装 Google Chrome
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          echo "Chrome 版本：$(google-chrome --version)"

      - name: 5. 安装 sing-box
        run: |
          cd /tmp
          curl -fsSL -o sing-box.tar.gz \
            "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz"
          tar xzf sing-box.tar.gz
          sudo mv sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box /usr/local/bin/
          echo "sing-box 版本：$(sing-box version | head -1)"

      - name: 6. 安装 Python 依赖（seleniumbase / requests）
        run: pip install --upgrade pip seleniumbase requests

      - name: 7. 检查代理配置
        id: proxy_check
        env:
          PROXY_STR: ${{ secrets.PROXY_STR }}
        run: |
          if [ -z "$PROXY_STR" ]; then
            echo "⚠️  未配置 PROXY_STR，本次直连运行（GitHub Actions IP 大概率被 CF 拉黑）"
            echo "use_proxy=false" >> $GITHUB_OUTPUT
          else
            echo "✓ 检测到 PROXY_STR（长度 ${#PROXY_STR}，协议 $(echo "$PROXY_STR" | cut -d: -f1)）"
            echo "use_proxy=true" >> $GITHUB_OUTPUT
          fi

      - name: 8. 生成 sing-box 配置文件（config.json）
        if: steps.proxy_check.outputs.use_proxy == 'true'
        env:
          PROXY_STR: ${{ secrets.PROXY_STR }}
        run: |
          python convert_proxy.py
          echo "--- config.json 摘要（不含密钥）---"
          python -c "
          import json
          c = json.load(open('config.json'))
          o = c['outbounds'][0]
          print(f'  协议  : {o.get(\"type\")}')
          print(f'  出口  : {o.get(\"server\")}:{o.get(\"server_port\")}')
          print(f'  监听  : 127.0.0.1:8080 (mixed)')
          "

      - name: 9. 启动 sing-box 后台进程
        if: steps.proxy_check.outputs.use_proxy == 'true'
        run: |
          nohup sing-box run -c config.json > sing-box.log 2>&1 &
          echo $! > sing-box.pid
          echo "sing-box PID: $(cat sing-box.pid)"
          # 等 :8080 起来
          for i in $(seq 1 20); do
            if ss -ltn | grep -q ':8080 '; then
              echo "✓ sing-box 已在 127.0.0.1:8080 监听（等待 ${i}s）"
              exit 0
            fi
            sleep 1
          done
          echo "::error::sing-box 20 秒内未监听 :8080"
          echo "--- sing-box.log ---"
          cat sing-box.log
          exit 1

      - name: 10. 验证代理出口 IP（直连 vs 代理对比）
        if: steps.proxy_check.outputs.use_proxy == 'true'
        run: |
          echo "--- 直连出口 IP（GitHub Actions runner）---"
          DIRECT=$(curl -s --max-time 10 https://api.ipify.org || echo "FAIL")
          echo "  $DIRECT"
          echo
          echo "--- 走 sing-box 代理出口 IP ---"
          PROXIED=$(curl -s --max-time 15 -x "$LOCAL_PROXY" https://api.ipify.org || echo "FAIL")
          echo "  $PROXIED"
          echo
          if [ "$PROXIED" = "FAIL" ] || [ -z "$PROXIED" ]; then
            echo "::error::代理不通，看步骤 9 的 sing-box 日志"
            tail -n 50 sing-box.log
            exit 1
          fi
          if [ "$DIRECT" = "$PROXIED" ]; then
            echo "::warning::直连和代理 IP 相同！代理可能没生效"
          else
            echo "✓ 代理生效：出口从 $DIRECT 变成 $PROXIED"
          fi

      - name: 11. 运行续期脚本 renew.py
        id: renew
        env:
          TOKEN: ${{ secrets.BOT_HOSTING_TOKEN }}
          PROXY: ${{ steps.proxy_check.outputs.use_proxy == 'true' && env.LOCAL_PROXY || '' }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python renew.py

      - name: 12. 停止 sing-box
        if: steps.proxy_check.outputs.use_proxy == 'true' && always()
        run: |
          if [ -f sing-box.pid ]; then
            kill "$(cat sing-box.pid)" 2>/dev/null && echo "✓ sing-box 已停止" || echo "ℹ️  sing-box 已退出"
          fi
          echo "--- sing-box.log 末尾 30 行 ---"
          tail -n 30 sing-box.log || true

      - name: 13. 上传调试文件（截图 / HTML / 日志）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: |
            page_debug.html
            page_debug.png
            after_renew.png
            sing-box.log
          if-no-files-found: ignore
          retention-days: 7
